# General Server Config 
server:
  port: 9000

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**

  rabbitmq:
    username: admin
    password: admin
    host: 161.35.72.98
    listener:
      simple:
        retry:
          enabled: true
          multiplier: 2
          max-interval: 10000ms
          max-retries: 3

# Actuator Config
management:
  endpoints:
    web:
      exposure:
        include:
          - "gateway"

# Eureka Server
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka